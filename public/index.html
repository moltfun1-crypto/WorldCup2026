<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Cup 2026 — Kick Off Times Thailand Indonesia UK</title>
  <meta name="description" content="FIFA World Cup 2026 fixtures with kickoff times in UK, Bangkok and Bali, plus which UK TV channel each match is on." />
  <link rel="preconnect" href="https://flagcdn.com" />
  <link rel="icon" href="data:image/svg+xml,&lt;svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'&gt;&lt;text y='.9em' font-size='90'&gt;⚽&lt;/text&gt;&lt;/svg&gt;" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <div class="brand">
        <img class="brand-mark" src="wc2026-emblem.png" alt="FIFA World Cup 2026 emblem" />
        <div>
          <h1>World Cup 2026</h1>
          <p class="tagline">Kick Off Times Thailand Indonesia UK</p>
        </div>
      </div>
      <div class="zones-legend" id="zonesLegend"></div>
    </div>
  </header>

  <main class="wrap">
    <section id="nowNext" class="now-next" aria-live="polite" hidden></section>

    <section class="controls" aria-label="Filters">
      <input id="search" class="search" type="search" placeholder="Search team or venue…" autocomplete="off" />
      <label class="select-wrap"><span class="sr-only">Nation</span>
        <select id="nationFilter" class="select" aria-label="Filter by nation"></select>
      </label>
      <label class="select-wrap"><span class="sr-only">Group</span>
        <select id="groupFilter" class="select" aria-label="Filter by group"></select>
      </label>
      <label class="select-wrap"><span class="sr-only">Day</span>
        <select id="dayFilter" class="select" aria-label="Filter by day"></select>
      </label>
      <button id="compactToggle" class="toggle-btn" type="button" aria-pressed="false" title="Show only your time + UK">🕒 Compact times</button>
    </section>

    <div id="filterBanner" class="filter-banner" hidden></div>

    <p class="source-note" id="sourceNote" hidden></p>

    <div class="view-tabs" role="tablist">
      <button class="view-tab" data-view="fixtures" role="tab" aria-selected="true">Fixtures</button>
      <button class="view-tab" data-view="tables" role="tab" aria-selected="false">Group Tables</button>
    </div>

    <details id="bracketSection" class="bracket-section">
      <summary class="bracket-summary">
        <span class="bs-title">🏆 Knockout bracket</span>
        <span class="bs-hint">tap to show</span>
      </summary>
      <div id="bracket" class="bracket-scroll" aria-live="polite"></div>
    </details>

    <div class="layout">
      <section id="matchList" class="match-list" aria-live="polite"></section>

      <aside class="sidebar" aria-label="Group tables">
        <h2 class="sidebar-title">Group tables</h2>
        <div id="standings" class="standings"></div>
      </aside>
    </div>

    <p class="empty" id="emptyState" hidden>No matches match your filters.</p>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <span>Times auto-adjust for daylight saving. UK channel listings are indicative.</span>
    </div>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
